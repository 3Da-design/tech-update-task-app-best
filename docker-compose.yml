# legacy 専用スタック（改良構成 tech-update-task-app と同時起動可能）
# ポート既定: Web 8001 / DB 5433 / Vite 5174（.env の APP_HTTP_PORT 等で上書き可）
name: tech-update-task-app-legacy

services:
  app:
    # docker/php/Dockerfile を変更したら再ビルド: docker compose build app && docker compose up -d
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tech-update-task-app-legacy-php
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      # .env がホスト用でも、コンテナ内は compose の値が使われる（php-fpm clear_env=no）
      APP_URL: http://localhost:${APP_HTTP_PORT:-8001}
      ASSET_URL: http://localhost:${APP_HTTP_PORT:-8001}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_DATABASE: laravel
      DB_USERNAME: postgres
      DB_PASSWORD: secret
    volumes:
      - .:/var/www/html
    networks:
      - app-network
    depends_on:
      postgres:
        condition: service_healthy

  # フロントビルド用（app には Node なし）。常時起動しない — profile node で run する。
  # フロントはホストで npm しない。例: composer npm:docker-build
  # 開発: docker compose --profile node run --rm --service-ports node npm run dev
  node:
    image: node:22-alpine
    container_name: tech-update-task-app-legacy-node
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - node_modules_legacy:/var/www/html/node_modules
    networks:
      - app-network
    ports:
      - "${NODE_DEV_PORT:-5174}:5173"
    profiles:
      - node

  nginx:
    image: nginx:1.27-alpine
    container_name: tech-update-task-app-legacy-nginx
    restart: unless-stopped
    ports:
      - "${APP_HTTP_PORT:-8001}:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app

  postgres:
    image: postgres:16-alpine
    container_name: tech-update-task-app-legacy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: laravel
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data_legacy:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d laravel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data_legacy:
  node_modules_legacy:
